tabs:
  padding-y:
    value: "{size-px.s}"
  padding-x:
    value: "{size-px.m}"
  corner-radius:
    value: "calc({size-px.s} * 2 + {line-height-m})"
  border-width:
    value: "{border-width.100}"
  border-style:
    value: "{border-style.default}"
  border-color:
    default:
      value: "{form-control.border-color.default}"
    disabled:
      value: "{form-control.border-color.disabled}"
  background-color:
    default:
      value: "{neutral-soft-background-color.default}"
    selected:
      value: "{neutral.color.100}"
  color:
    default:
      value: "{neutral-soft-content-color}"
    disabled:
      value: "{disabled-soft-content-color}"
  font-weight:
    selected:
      value: "{font-weight.bold}"
  spacing:
    value: "{size-rem.s}"
  separator-height:
    value: "{size-px.m}"
