breadcrumb:
  spacing:
    value: "{size-rem.s}"
  font-weight:
    default:
      value: "{font-weight.normal}"
    current:
      value: "{font-weight.bold}"

  color:
    default:
      value: "{text.color.default}"
    hover:
      value: "{neutral.color.900}"
    pressed:
      value: "{neutral.color.800}"

  # Dark
  color-dark:
    default:
      value: "{link.color-dark.default}"
    hover:
      value: "{link.color-dark.hover}"
    pressed:
      value: "{link.color-dark.pressed}"

  # Light
  color-light:
    default:
      value: "{link.color-light.default}"
    hover:
      value: "{link.color-light.hover}"
    pressed:
      value: "{link.color-light.pressed}"

  # Dark Static
  color-dark-static:
    default:
      value: "{link.color-dark-static.default}"
    hover:
      value: "{link.color-dark-static.hover}"
    pressed:
      value: "{link.color-dark-static.pressed}"

  # Light Static
  color-light-static:
    default:
      value: "{link.color-light-static.default}"
    hover:
      value: "{link.color-light-static.hover}"
    pressed:
      value: "{link.color-light-static.pressed}"
