breadcrumb:
  color:
    default:
      value: "{text.color.default}"
    hover:
      value: "{neutral.color.900}"
    pressed:
      value: "{neutral.color.800}"
  spacing:
    value: "{size-rem.s}"
  font-weight:
    default:
      value: "{font-weight.normal}"
    current:
      value: "{font-weight.bold}"

  # Dark
  color-dark:
    default:
      value: "{dark.color.800}"
    hover:
      value: "{dark.color.700}"
    pressed:
      value: "{dark.color.600}"

  # Light
  color-light:
    default:
      value: "{light.color.800}"
    hover:
      value: "{light.color.700}"
    pressed:
      value: "{light.color.600}"

  # Foreground
  color-foreground:
    default:
      value: "{foreground.color.800}"
    hover:
      value: "{foreground.color.700}"
    pressed:
      value: "{foreground.color.600}"

  # Foreground Inverted
  color-foreground-inverted:
    default:
      value: "{foreground-inverted.color.800}"
    hover:
      value: "{foreground-inverted.color.700}"
    pressed:
      value: "{foreground-inverted.color.600}"
