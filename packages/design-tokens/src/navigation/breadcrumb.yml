breadcrumb:
  spacing:
    value: "{size-rem.s}"
  font-weight:
    default:
      value: "{font-weight.normal}"
    current:
      value: "{font-weight.bold}"

  color-primary:
    default:
      value: "{primary.color.1000}"
    hover:
      value: "{primary.color.900}"
    pressed:
      value: "{primary.color.800}"

  # Dark
  color-dark:
    default:
      value: "{dark.color.800}"
    hover:
      value: "{dark.color.700}"
    pressed:
      value: "{dark.color.600}"

  # Light
  color-light:
    default:
      value: "{light.color.800}"
    hover:
      value: "{light.color.700}"
    pressed:
      value: "{light.color.600}"

  # Static Dark
  color-static-dark:
    default:
      value: "{static-dark.color.800}"
    hover:
      value: "{static-dark.color.700}"
    pressed:
      value: "{static-dark.color.600}"

  # Static Light
  color-static-light:
    default:
      value: "{static-light.color.800}"
    hover:
      value: "{static-light.color.700}"
    pressed:
      value: "{static-light.color.600}"
