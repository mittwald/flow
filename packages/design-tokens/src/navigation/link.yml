link:
  icon-height:
    value: "calc({font-size-text.m} * 1.25)"
  icon-height-s:
    value: "calc({font-size-text.s} * 1.25)"
  font-weight:
    value: "{font-weight.bold}"
  spacing:
    value: "{size-rem.xs}"

  color:
    default:
      value: "{primary.color.800}"
    hover:
      value: "{primary.color.900}"
    pressed:
      value: "{primary.color.1000}"
    disabled:
      value: "{disabled-plain-content-color}"

  # Dark
  color-dark:
    default:
      value: "{dark.color.800}"
    hover:
      value: "{dark.color.700}"
    pressed:
      value: "{dark.color.600}"
    disabled:
      value: "{disabled-plain-dark-content-color}"

  # Light
  color-light:
    default:
      value: "{light.color.800}"
    hover:
      value: "{light.color.700}"
    pressed:
      value: "{light.color.600}"
    disabled:
      value: "{disabled-plain-light-content-color}"

  # Dark Static
  color-dark-static:
    default:
      value: "{dark-static.color.800}"
    hover:
      value: "{dark-static.color.700}"
    pressed:
      value: "{dark-static.color.600}"
    disabled:
      value: "{disabled-plain-dark-static-content-color}"

  # Light Static
  color-light-static:
    default:
      value: "{light-static.color.800}"
    hover:
      value: "{light-static.color.700}"
    pressed:
      value: "{light-static.color.600}"
    disabled:
      value: "{disabled-plain-light-static-content-color}"
