illustrated-message:
  padding:
    value: "{size-px.m}"
  spacing:
    value: "{size-rem.m}"

  content-color:
    value: "{heading.color}"
  danger-content-color:
    value: "{danger.color.900}"
  unavailable-content-color:
    value: "{unavailable.color.800}"
  dark-content-color:
    value: "{dark-plain-content-color}"
  light-content-color:
    value: "{light-plain-content-color}"
  dark-static-content-color:
    value: "{dark-static-plain-content-color}"
  light-static-content-color:
    value: "{light-static-plain-content-color}"
