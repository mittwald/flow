inline-code:
  font-size:
    value: "{font-size-text.s}"
  padding-x:
    value: "{size-px.xs}"
  padding-y:
    value: "{size-px.xxs}"
  corner-radius:
    value: "{corner-radius.s}"
  background-color:
    value: "{neutral-soft-background-color.default}"
  content-color:
    value: "{neutral-soft-content-color}"

  # Dark
  dark-background-color:
    value: "{dark-soft-background-color.default}"
  dark-content-color:
    value: "{dark-soft-content-color}"

  # Light
  light-background-color:
    value: "{light-soft-background-color.default}"
  light-content-color:
    value: "{light-soft-content-color}"

  # Static Dark
  static-dark-background-color:
    value: "{static-dark-soft-background-color.default}"
  static-dark-content-color:
    value: "{static-dark-soft-content-color}"

  # Static Light
  static-light-background-color:
    value: "{static-light-soft-background-color.default}"
  static-light-content-color:
    value: "{static-light-soft-content-color}"
