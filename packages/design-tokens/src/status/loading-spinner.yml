loading-spinner:
  transition-duration:
    value: 2000ms
  transition-duration-slow:
    value: 6000ms
  color:
    value: "{icon.color}"
  color-dark:
    value: "{dark-plain-content-color}"
  color-light:
    value: "{light-plain-content-color}"
  color-dark-static:
    value: "{dark-static-plain-content-color}"
  color-light-static:
    value: "{light-static-plain-content-color}"
