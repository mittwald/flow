loading-spinner:
  transition-duration:
    value: 2000ms
  transition-duration-slow:
    value: 6000ms
  color:
    value: "{icon.color}"
  color-light:
    value: "{light-plain-content-color}"
  color-dark:
    value: "{dark-plain-content-color}"
  color-static-light:
    value: "{static-light-plain-content-color}"
  color-static-dark:
    value: "{static-dark-plain-content-color}"
