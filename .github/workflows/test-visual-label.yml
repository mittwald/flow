name: Run Visual Regression Tests

on:
  workflow_dispatch:
  pull_request:
    types:
      - labeled

jobs:
  run-visual-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event_name == 'workflow_dispatch' || (github.event.label.name ==
      'run-visual-tests' &&
       github.head_ref != github.event.repository.default_branch)

    # one at a time per branch; re-labeling supersedes an in-flight run
    concurrency:
      group: visual-regression-run@${{ github.head_ref }}
      cancel-in-progress: true

    permissions:
      contents: read # checkout only; this run never pushes
      pull-requests: write # needs to remove the triggering label

    steps:
      - name: Remove label if exists
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ github.token }}
          script: |
            const label = "run-visual-tests";
            try {
                await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    name: label,
                });
                console.log(`Label '${label}' removed.`);
            } catch (e) {
                if (e.status === 404) {
                   console.log(`Label '${label}' not present, skipping.`);
                } else {
                    throw e;
                }
            }

      - name: Checkout selected branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - run: pnpm test:browser:prepare --only-shell

      - name: Run visual tests
        # run without file parallelism, because firefox has issues with parallel visual tests
        run: |
          pnpm nx run-many -t test:visual --parallel=1 --browser.fileParallelism=false

      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-diffs
          path: packages/**/.vitest-attachments/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "### ✅ Visual Regression Tests Passed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All visual snapshots match the committed baselines." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Visual Regression Tests Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The visual test step did not pass. If snapshots differ from the committed baselines, download the **visual-diffs** artifact from this run to inspect the actual/diff images (the artifact is absent if the run failed before comparison, e.g. during install or browser setup)." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "If the differences are intentional, update the baselines by adding the \`update-screenshots\` label to the PR." >> $GITHUB_STEP_SUMMARY
          fi
