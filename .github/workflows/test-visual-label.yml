name: Run Visual Regression Tests

on:
  workflow_dispatch:
  pull_request:
    types:
      - labeled

jobs:
  run-visual-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event_name == 'workflow_dispatch' || (github.event.label.name ==
      'run-visual-tests' &&
       github.head_ref != github.event.repository.default_branch)

    # one at a time per branch; re-labeling supersedes an in-flight run
    concurrency:
      group: visual-regression-run@${{ github.head_ref }}
      cancel-in-progress: true

    permissions:
      contents: read # checkout only; this run never pushes
      pull-requests: write # needs to remove the triggering label

    steps:
      - name: Remove label if exists
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ github.token }}
          script: |
            const label = "run-visual-tests";
            try {
                await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    name: label,
                });
                console.log(`Label '${label}' removed.`);
            } catch (e) {
                if (e.status === 404) {
                   console.log(`Label '${label}' not present, skipping.`);
                } else {
                    throw e;
                }
            }

      - name: Checkout selected branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - run: pnpm test:browser:prepare --only-shell

      - name: Run visual tests
        # run without file parallelism, because firefox has issues with parallel visual tests
        run: |
          pnpm nx run-many -t test:visual --parallel=1 --browser.fileParallelism=false

      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: visual-diffs
          path: packages/**/.vitest-attachments/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "### ✅ Visual Regression Tests Passed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All visual snapshots match the committed baselines." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Visual Regression Tests Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The visual test step did not pass. If snapshots differ from the committed baselines, download the **visual-diffs** artifact from this run to inspect the actual/diff images (the artifact is absent if the run failed before comparison, e.g. during install or browser setup)." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "If the differences are intentional, update the baselines by adding the \`update-screenshots\` label to the PR." >> $GITHUB_STEP_SUMMARY
          fi
