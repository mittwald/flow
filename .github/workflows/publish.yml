name: Publish packages to NPM

on:
  workflow_dispatch:
    inputs:
      only_publish:
        description: "Publish missing packages only, without a version bump"
        type: boolean
        default: false
  pull_request_target:
    types:
      - closed
    branches:
      - main

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    if:
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      PUBLISH_PAT: ${{ secrets.PUBLISH_PAT }}
      GH_TOKEN: ${{ secrets.PUBLISH_PAT }}

    steps:
      - name: Checkout ⬇️
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PUBLISH_PAT }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 🎛️
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Git Identity 🪪
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: pnpm Install 📦️
        run: pnpm install --frozen-lockfile

      - name: Setup NX 1/2 🎛️
        uses: nrwl/nx-set-shas@v4

      - name: Setup NX 2/2 🎛
        if: github.ref != 'refs/heads/main'
        run: git branch --track main origin/main

      - name: Build 🔨
        run: pnpm build

      - name: Version 🏷️
        if: ${{ !inputs.only_publish }}
        run: |
          pnpm lerna version \
            --force-publish \
            --conventional-commits --conventional-prerelease="*" \
            --create-release github \
            --message "chore(release): bump version to %v" \
            --yes \
            --tag-version-prefix ""

      - name: Publish 🚀
        run: |
          for attempt in 1 2 3; do
            echo "::group::Publish attempt ${attempt}/3"
            if pnpm lerna publish from-package --yes --no-private; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            if [ "${attempt}" -lt 3 ]; then
              echo "Publish attempt ${attempt} failed, retrying in 30s…"
              sleep 30
            fi
          done
          echo "::error::All publish attempts failed" >&2
          exit 1
