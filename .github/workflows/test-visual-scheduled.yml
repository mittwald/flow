name: Run scheduled visual tests
on:
  workflow_dispatch:
  schedule:
    - cron: "0 8,15 * * *"

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare browser tests
        run: pnpm test:browser:prepare --only-shell

      - name: Run visual tests
        # Run without file parallelism, because firefox has issues with parallel visual tests.
        # Retry the whole step because firefox intermittently *hangs* (not a snapshot diff) on a
        # single visual test file in headless CI, which aborts the run with exit code 1 even though
        # every test that runs passes. A hang can't be recovered by vitest's per-test `retry`, so we
        # re-run the step with a fresh vitest/browser process. Successful `^build` deps are served
        # from the nx cache, so retries only re-execute test:visual.
        run: |
          for attempt in 1 2 3; do
            echo "::group::Visual tests (attempt $attempt/3)"
            if pnpm nx run-many -t test:visual --parallel=1 --browser.fileParallelism=false; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::Visual tests failed on attempt $attempt/3 (likely a flaky firefox hang), retrying..."
          done
          echo "::error::Visual tests still failing after 3 attempts."
          exit 1

      - name: Send alerting message to Slack
        if: failure()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "Visual tests failed"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "Visual tests failed. For more details, see the [output of the failed action](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

  cross-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare browser tests
        run: pnpm test:browser:prepare --only-shell

      - name: Build workspace packages
        # The cross-version steps below run the package scripts directly (not via
        # the nx target), so nx's `^build` never fires. Build the host packages
        # the harnesses consume from dist — @mittwald/flow-react-components
        # (incl. the /internal subpath) and @mittwald/flow-remote-react-renderer —
        # explicitly. `^build` pulls in the full dependency closure; nx caches it.
        run: pnpm nx run remote-react-components:build

      - name: Install old published versions
        # Resolves + npm-installs the target old versions (network) and writes
        # cross-version.manifest.json. Kept a separate step so a publish-gap
        # install failure shows as its own red step.
        run:
          corepack pnpm --filter @mittwald/flow-remote-react-components
          test:cross-version:prepare

      - name: Run cross-version smoke tests
        id: crossversion
        # Renders each installed old remote version through the current host over
        # the real iframe connection and compares its host HTML to an ephemeral
        # reference rendered from the current version. This suite is WebKit-only
        # and waits for stable HTML, so the visual job's flaky Firefox hang
        # rationale does not apply. Retrying would re-run every version and
        # obscure which version failed.
        run:
          corepack pnpm --filter @mittwald/flow-remote-react-components
          test:cross-version

      - name: Run in-process cross-version tests
        id: crossversion_inprocess
        if:
          always() && (steps.crossversion.outcome == 'success' ||
          steps.crossversion.outcome == 'failure')
        # Reuses the broad visual-test corpus in-process. Like the iframe
        # harness, it is WebKit-only and deterministic; retrying every version
        # would obscure the failing version without addressing Firefox flakiness.
        run:
          corepack pnpm --filter @mittwald/flow-remote-react-components
          test:cross-version-inprocess

      - name: Send alerting message to Slack
        if: failure()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Cross-version smoke tests failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Cross-version smoke tests failed.*"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ toJSON(format('*Iframe harness*{0}{1}', '\n', steps.crossversion.outputs.failures || 'No failures reported.')) }}
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ toJSON(format('*In-process harness*{0}{1}', '\n', steps.crossversion_inprocess.outputs.failures || 'No failures reported.')) }}
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Open workflow run>"
                    }
                  ]
                }
              ]
            }
