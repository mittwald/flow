name: Update Visual Regression Screenshots

on:
  workflow_dispatch:
  pull_request:
    types:
      - labeled

env:
  AUTHOR_NAME: "github-actions[bot]"
  AUTHOR_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
  COMMIT_MESSAGE: |
    test: update visual regression screenshots

    Co-authored-by: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>

jobs:
  update-screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: |
      ${{ (github.event.label.name == 'update-screenshots') && (github.head_ref != github.event.repository.default_branch) }}

    # one at a time per branch
    concurrency:
      group:
        visual-regression-screenshots@${{ github.head_ref }}@${{
        github.event.label.name }}
      cancel-in-progress: true

    permissions:
      contents: write # needs to push changes
      pull-requests: write # needs to remove the triggering label

    steps:
      - name: Remove label if exists
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ github.token }}
          script: |
            const label = "update-screenshots";
            try {
                await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    name: label,
                });
                console.log(`Label '${label}' removed.`);
            } catch (e) {
                if (e.status === 404) {
                   console.log(`Label '${label}' not present, skipping.`);
                } else {
                    throw e;
                }
            }

      - name: Checkout selected branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "${{ env.AUTHOR_NAME }}"
          git config --global user.email "${{ env.AUTHOR_EMAIL }}"

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - run: pnpm test:browser:prepare --only-shell

      - name: Update Visual Regression Screenshots
        run: pnpm test:visual --update --browser.fileParallelism=false
      # check what changed
      - name: Check for changes
        id: check_changes
        run: |
          CHANGED_FILES=$(git status --porcelain | awk '{print $2}')
          if [ "${CHANGED_FILES:+x}" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"

            # save the list for the summary
            echo "changed_files<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "changed_count=$(echo "$CHANGED_FILES" | wc -l)" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Commit changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git add -A
          git commit -m "${{ env.COMMIT_MESSAGE }}"

      - name: Push changes
        if: steps.check_changes.outputs.changes == 'true'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: git push origin "$HEAD_REF"

      - name: Summary
        env:
          CHANGES: ${{ steps.check_changes.outputs.changes }}
          CHANGED_COUNT: ${{ steps.check_changes.outputs.changed_count }}
          CHANGED_FILES: ${{ steps.check_changes.outputs.changed_files }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$CHANGES" == "true" ]]; then
            echo "### 📸 Visual Regression Screenshots Updated" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Successfully updated **$CHANGED_COUNT** screenshot(s) on \`$HEAD_REF\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "#### Changed Files:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$CHANGED_FILES" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ The updated screenshots have been committed and pushed. Your visual regression baseline is now up to date!" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ℹ️ No Screenshot Updates Required" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "The visual regression test command ran successfully but no screenshots needed updating." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "All screenshots are already up to date! 🎉" >> "$GITHUB_STEP_SUMMARY"
          fi
