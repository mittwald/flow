name: Build & Deploy Preview Apps

on:
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: docs
            dockerfile: apps/docs/Dockerfile
            image_suffix: docs
          - app: storybook
            dockerfile: packages/components/Dockerfile
            image_suffix: storybook

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docs
        id: meta-docs
        if: matrix.image_suffix == 'docs'
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images:
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image_suffix }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: Extract metadata for Storybook
        id: meta-storybook
        if: matrix.image_suffix == 'storybook'
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images:
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image_suffix }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags:
            ${{ matrix.image_suffix == 'docs' && steps.meta-docs.outputs.tags ||
            steps.meta-storybook.outputs.tags }}
          labels:
            ${{ matrix.image_suffix == 'docs' && steps.meta-docs.outputs.labels
            || steps.meta-storybook.outputs.labels }}
          build-args: |
            NEXT_BASE_PATH=

  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
      pull-requests: write

    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy preview environment
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MITTWALD_PROJECT_ID: ${{ secrets.MITTWALD_PROJECT_ID }}
          MITTWALD_API_TOKEN: ${{ secrets.MITTWALD_API_TOKEN }}
          # Derive the exact refs the build job pushed (type=ref,event=pr =>
          # `pr-<number>`). Deriving them here avoids the matrix job-output
          # clobber that left one of the two empty and half-deployed previews.
          DOCS_IMAGE_TAG:
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/docs:pr-${{
            github.event.pull_request.number }}
          STORYBOOK_IMAGE_TAG:
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/storybook:pr-${{
            github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          pnpm tsx dev/deploy-review.ts
