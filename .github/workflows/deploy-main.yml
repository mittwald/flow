name: Build & Deploy main to mittwald

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: deploy-main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: docs
            dockerfile: apps/docs/Dockerfile
            image_suffix: docs
          - app: storybook
            dockerfile: packages/components/Dockerfile
            image_suffix: storybook

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docs
        id: meta-docs
        if: matrix.image_suffix == 'docs'
        uses: docker/metadata-action@v5
        with:
          images:
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image_suffix }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest
            type=sha

      - name: Extract metadata for Storybook
        id: meta-storybook
        if: matrix.image_suffix == 'storybook'
        uses: docker/metadata-action@v5
        with:
          images:
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image_suffix }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags:
            ${{ matrix.image_suffix == 'docs' && steps.meta-docs.outputs.tags ||
            steps.meta-storybook.outputs.tags }}
          labels:
            ${{ matrix.image_suffix == 'docs' && steps.meta-docs.outputs.labels
            || steps.meta-storybook.outputs.labels }}
          build-args: |
            NEXT_BASE_PATH=

      - name: Trigger docs redeploy webhook
        if: matrix.image_suffix == 'docs'
        run:
          curl --fail --silent --show-error --location "$FLOW_REDEPLOY_WEBHOOK"
        env:
          FLOW_REDEPLOY_WEBHOOK: ${{ secrets.FLOW_REDEPLOY_WEBHOOK }}

      - name: Trigger storybook redeploy webhook
        if: matrix.image_suffix == 'storybook'
        run:
          curl --fail --silent --show-error --location
          "$STORYBOOK_REDEPLOY_WEBHOOK"
        env:
          STORYBOOK_REDEPLOY_WEBHOOK: ${{ secrets.STORYBOOK_REDEPLOY_WEBHOOK }}
