name: Publish docs to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate redirect site 🔀
        run: |
          mkdir -p out
          cat > out/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Redirecting to flow.mittwald.de</title>
              <link rel="canonical" href="https://flow.mittwald.de/" />
              <meta name="robots" content="noindex" />
              <meta http-equiv="refresh" content="0; url=https://flow.mittwald.de/" />
              <script>
                (function () {
                  var target = "https://flow.mittwald.de";
                  var path = window.location.pathname.replace(/^\/flow/, "");
                  window.location.replace(target + path + window.location.search + window.location.hash);
                })();
              </script>
            </head>
            <body>
              <p>This site has moved to <a href="https://flow.mittwald.de/">flow.mittwald.de</a>.</p>
            </body>
          </html>
          HTML
          cp out/index.html out/404.html

      - name: Configure GitHub pages ⚙️
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact ⬆️
        uses: actions/upload-pages-artifact@v4
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publish to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
